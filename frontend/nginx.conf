server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /admin.html {
        auth_basic "JobPulse Admin";
        auth_basic_user_file /etc/nginx/.admin_htpasswd;
        try_files /admin.html =404;
    }

    location ^~ /api/admin/ {
        auth_basic "JobPulse Admin";
        auth_basic_user_file /etc/nginx/.admin_htpasswd;
        proxy_pass http://api:8000/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }



    # Security hardening
    server_tokens off;
    client_max_body_size 2m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Never expose hidden/sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* /(\.env|\.git|\.admin|backup|backups|logs|docker-compose|Dockerfile|requirements\.txt) {
        deny all;
        return 404;
    }


}
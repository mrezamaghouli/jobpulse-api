services:
  db:
    image: postgres:16-alpine
    container_name: jobpulse-postgres-prod
    restart: unless-stopped
    environment:
      JOB_SEARCH_MIN_RELEVANCE_SCORE: "0.38"
      JOB_SEARCH_KEYWORD_MIN_RELEVANCE_SCORE: "0.12"
      SEARCH_DEMAND_MIN_RESULTS: "3"
      POSTGRES_DB: ${POSTGRES_DB:-jobpulse}
      POSTGRES_USER: ${POSTGRES_USER:-jobpulse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - jobpulse_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobpulse_user} -d ${POSTGRES_DB:-jobpulse}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobpulse-api-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JOB_PROVIDER: postgres
      APP_ENV: production
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      python -m scripts.repair_jobpulse_schema &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); print('ok')"]
      interval: 20s
      timeout: 10s
      retries: 10

    volumes:
      - ./.auth:/app/.auth:ro
      - ./logs:/app/logs
  frontend:
    image: nginx:alpine
    container_name: jobpulse-frontend-prod
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  jobpulse_postgres_data:

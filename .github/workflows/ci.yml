name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    name: Verify Python and Docker Compose
    runs-on: ubuntu-latest

    env:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: jobpulse
      POSTGRES_USER: jobpulse_user
      POSTGRES_PASSWORD: jobpulse_password
      DATABASE_URL: postgresql://jobpulse_user:jobpulse_password@db:5432/jobpulse
      LINKEDIN_BROWSER: chromium
      LINKEDIN_HEADLESS: "true"
      JOB_SEARCH_MIN_RELEVANCE_SCORE: "0.38"
      JOB_SEARCH_KEYWORD_MIN_RELEVANCE_SCORE: "0.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          POSTGRES_DB=jobpulse
          POSTGRES_USER=jobpulse_user
          POSTGRES_PASSWORD=jobpulse_password
          DATABASE_URL=postgresql://jobpulse_user:jobpulse_password@db:5432/jobpulse
          LINKEDIN_BROWSER=chromium
          LINKEDIN_HEADLESS=true
          JOB_SEARCH_MIN_RELEVANCE_SCORE=0.38
          JOB_SEARCH_KEYWORD_MIN_RELEVANCE_SCORE=0.12
          EOF

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python source
        run: |
          python -m compileall app scripts

      - name: Check important scripts
        run: |
          python -m py_compile scripts/collector_postgres.py
          python -m py_compile scripts/process_search_demand_queue.py
          python -m py_compile scripts/seed_autonomous_search_queue.py
          python -m py_compile scripts/build_linkedin_collection_targets.py
          python -m py_compile scripts/migrate_database.py

      - name: Create dummy prod env files for compose validation
        shell: bash
        run: |
          set -euo pipefail
          : > .env
          printf '%s\n' 'JOBPULSE_PUBLIC_API_KEYS=dummy-ci-key' > .api_keys.env
          sudo mkdir -p /opt/jobpulse
          printf '%s\n' 'JOBPULSE_ADMIN_TOKEN=dummy-ci-admin-token' | sudo tee /opt/jobpulse/.admin.env >/dev/null
          printf '%s\n' 'dummy-ci-admin-token' | sudo tee /opt/jobpulse/.admin_token >/dev/null
          printf '%s\n' 'TELEGRAM_BOT_TOKEN=dummy' | sudo tee /opt/jobpulse/.telegram_alert.env >/dev/null

      - name: Validate Docker Compose config
        run: |
          docker compose -f docker-compose.prod.yml config

      - name: Check production shell scripts
        run: |
          bash -n scripts/production_health_alert.sh
          bash -n scripts/production_cleanup.sh
          bash -n scripts/production_smoke_test.sh


name: Deploy Production

on:
  workflow_run:
    workflows:
      - Build JobPulse API Image
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: jobpulse-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      VM_HOST: "35.192.251.190"
      VM_USER: "mrezamaghouli"
      VM_PORT: "22"
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VM_SSH_KEY:-}" ]; then
            echo "VM_SSH_KEY secret is missing"
            exit 1
          fi

      - name: Deploy from GHCR to production VM
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/jobpulse_deploy_key
          chmod 600 ~/.ssh/jobpulse_deploy_key

          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

          GHCR_TOKEN_B64="$(printf '%s' "${GHCR_TOKEN:-}" | base64 -w 0)"

          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" "$VM_USER@$VM_HOST" "GHCR_TOKEN_B64='$GHCR_TOKEN_B64' bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/jobpulse

          git fetch origin main
          git reset --hard origin/main

          if [ -n "${GHCR_TOKEN_B64:-}" ]; then
            echo "$GHCR_TOKEN_B64" | base64 -d | docker login ghcr.io -u mrezamaghouli --password-stdin
          fi

          ./scripts/deploy_prod_from_ghcr.sh

          docker compose -f docker-compose.prod.yml ps
          curl -fsS http://localhost/api/health
          REMOTE

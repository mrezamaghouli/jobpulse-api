name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    env:
      VM_HOST: "35.192.251.190"
      VM_USER: "mrezamaghouli"
      VM_PORT: "22"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install SSH and rsync tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then
            echo "VM_SSH_KEY secret is missing"
            exit 1
          fi

          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/jobpulse_deploy_key
          chmod 600 ~/.ssh/jobpulse_deploy_key

          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" \
            "$VM_USER@$VM_HOST" "echo 'SSH connection OK' && hostname"

      - name: Sync repository to VM
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.auth' \
            --exclude='logs' \
            --exclude='sample_output' \
            --exclude='scripts/__pycache__' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.dump' \
            --exclude='*.sql' \
            -e "ssh -i ~/.ssh/jobpulse_deploy_key -p $VM_PORT" \
            ./ "$VM_USER@$VM_HOST:/opt/jobpulse/"

      - name: Deploy containers on VM
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'EOF'
          set -e

          cd /opt/jobpulse

          docker compose -f docker-compose.prod.yml exec -T db psql -U jobpulse_user -d jobpulse -c "
          ALTER TABLE jobs
          ADD COLUMN IF NOT EXISTS company_logo_url TEXT;
          "

          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          sleep 5

          curl -fsS http://localhost/api/health
          EOF

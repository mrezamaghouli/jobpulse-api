name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    env:
      VM_HOST: "35.192.251.190"
      VM_USER: "mrezamaghouli"
      VM_PORT: "22"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install SSH and rsync tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then
            echo "VM_SSH_KEY secret is missing"
            exit 1
          fi

          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/jobpulse_deploy_key
          chmod 600 ~/.ssh/jobpulse_deploy_key

          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deploy timestamp
        run: |
          echo "DEPLOY_TS=$(date -u +%Y%m%d_%H%M%S)" >> "$GITHUB_ENV"

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" \
            "$VM_USER@$VM_HOST" "echo 'SSH connection OK' && hostname"

      - name: Pre-deploy backup on VM
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" "$VM_USER@$VM_HOST" <<EOF
          set -e

          mkdir -p /opt/jobpulse_backups/releases
          mkdir -p /opt/jobpulse_backups/db

          if [ -d /opt/jobpulse ]; then
            tar \
              --exclude='/opt/jobpulse/.auth' \
              --exclude='/opt/jobpulse/.env' \
              --exclude='/opt/jobpulse/logs' \
              --exclude='/opt/jobpulse/sample_output' \
              --exclude='/opt/jobpulse/scripts/__pycache__' \
              --exclude='/opt/jobpulse/jobpulse_local_backup.dump' \
              -czf /opt/jobpulse_backups/releases/jobpulse_${DEPLOY_TS}.tgz \
              -C /opt jobpulse
          fi

          cd /opt/jobpulse

          docker compose -f docker-compose.prod.yml exec -T db pg_dump \
            -U jobpulse_user \
            -d jobpulse \
            -Fc \
            -f /tmp/jobpulse_pre_deploy_${DEPLOY_TS}.dump

          docker compose -f docker-compose.prod.yml cp \
            db:/tmp/jobpulse_pre_deploy_${DEPLOY_TS}.dump \
            /opt/jobpulse_backups/db/jobpulse_pre_deploy_${DEPLOY_TS}.dump

          echo "Backup created:"
          echo "/opt/jobpulse_backups/releases/jobpulse_${DEPLOY_TS}.tgz"
          echo "/opt/jobpulse_backups/db/jobpulse_pre_deploy_${DEPLOY_TS}.dump"
          EOF

      - name: Sync repository to VM
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.auth' \
            --exclude='logs' \
            --exclude='sample_output' \
            --exclude='scripts/__pycache__' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.dump' \
            --exclude='*.sql' \
            -e "ssh -i ~/.ssh/jobpulse_deploy_key -p $VM_PORT" \
            ./ "$VM_USER@$VM_HOST:/opt/jobpulse/"

      - name: Deploy containers with rollback
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" "$VM_USER@$VM_HOST" <<EOF
          set -e

          BACKUP_FILE="/opt/jobpulse_backups/releases/jobpulse_${DEPLOY_TS}.tgz"

          rollback() {
            echo "Deploy failed. Rolling back..."

            if [ -f "\$BACKUP_FILE" ]; then
              tar -xzf "\$BACKUP_FILE" -C /opt
              cd /opt/jobpulse
              docker compose -f docker-compose.prod.yml build
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              echo "Rollback finished."
            else
              echo "No backup file found for rollback: \$BACKUP_FILE"
            fi
          }

          trap rollback ERR

          cd /opt/jobpulse

          docker compose -f docker-compose.prod.yml exec -T db psql -U jobpulse_user -d jobpulse -c "
          ALTER TABLE jobs
          ADD COLUMN IF NOT EXISTS company_logo_url TEXT;
          "

          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "Waiting for API health..."
          for i in \$(seq 1 20); do
            if curl -fsS http://localhost/api/health; then
              echo "Health check passed."
              trap - ERR
              exit 0
            fi

            echo "Health check attempt \$i failed. Retrying..."
            sleep 5
          done

          echo "Health check failed after retries."
          exit 1
          EOF

      - name: Cleanup old backups
        run: |
          ssh -i ~/.ssh/jobpulse_deploy_key -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'EOF'
          set -e

          find /opt/jobpulse_backups/releases -type f -name "jobpulse_*.tgz" -mtime +14 -delete || true
          find /opt/jobpulse_backups/db -type f -name "jobpulse_pre_deploy_*.dump" -mtime +14 -delete || true

          echo "Old backup cleanup finished."
          EOF
